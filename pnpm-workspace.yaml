ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
# pnpm appears to false-positive on evlog's trusted publishing metadata:
# https://github.com/HugoRCD/evlog/issues/168
trustPolicyExclude:
  - evlog@2.13.0
strictDepBuilds: true
blockExoticSubdeps: true

packages:
  - apps/*
  - packages/*

catalogs:
  dev:
    "@cloudflare/vitest-pool-workers": 0.14.7
    typescript: 6.0.3
    oxfmt: 0.45.0
    oxlint: 1.60.0
    oxlint-tsgolint: 0.21.1
    vitest: 4.1.4
    wrangler: 4.83.0
    "@cloudflare/workers-types": 4.20260418.1

  prod:
    "@hono/zod-openapi": 1.3.0
    "@octokit/core": 7.0.6
    "@octokit/plugin-paginate-rest": 14.0.0
    "@scalar/hono-api-reference": 0.10.9
    evlog: 2.13.0
    hono: 4.12.14
    zod: 4.3.6

  image:
    "@resvg/resvg-wasm": 2.4.1
    hono-jsx-to-react: 0.2.1
    satori: 0.26.0

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
