ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
strictDepBuilds: true
blockExoticSubdeps: true

packages:
  - apps/*
  - packages/*

catalogs:
  dev:
    "@cloudflare/vitest-pool-workers": 0.14.6
    typescript: 6.0.2
    oxfmt: 0.43.0
    oxlint: 1.60.0
    oxlint-tsgolint: 0.19.0
    vitest: 4.1.4
    wrangler: 4.82.2
    "@cloudflare/workers-types": 4.20260414.1

  prod:
    "@hono/zod-openapi": 1.3.0
    "@octokit/core": 7.0.6
    "@octokit/plugin-paginate-rest": 14.0.0
    "@scalar/hono-api-reference": 0.10.7
    hono: 4.12.12
    zod: 4.3.6

  image:
    "@resvg/resvg-wasm": 2.4.1
    hono-jsx-to-react: 0.2.1
    satori: 0.21.0

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
