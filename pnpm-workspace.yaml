ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
strictDepBuilds: true
blockExoticSubdeps: true

packages:
  - apps/*
  - packages/*

catalogs:
  dev:
    # "@cloudflare/vitest-pool-workers": 0.11.1
    "@cloudflare/vitest-pool-workers": https://pkg.pr.new/@cloudflare/vitest-pool-workers@11632
    "@luxass/eslint-config": 6.0.3
    "@types/node": 25.3.3
    eslint: 9.39.2
    eslint-plugin-format: 1.3.1
    typescript: 6.0.2
    vitest: 4.1.0-beta.1
    wrangler: 4.69.0
    "@cloudflare/workers-types": 4.20260305.0

  prod:
    "@hono/zod-openapi": 1.2.2
    "@octokit/core": 7.0.6
    "@octokit/plugin-paginate-rest": 14.0.0
    "@scalar/hono-api-reference": 0.9.47
    hono: 4.11.8
    zod: 4.3.6

  image:
    "@resvg/resvg-wasm": 2.4.1
    hono-jsx-to-react: 0.2.1
    satori: 0.21.0

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
