ignoreScripts: true
catalogMode: prefer
minimumReleaseAge: 5760
trustPolicy: no-downgrade
# pnpm appears to false-positive on evlog's trusted publishing metadata:
# https://github.com/HugoRCD/evlog/issues/168
trustPolicyExclude:
  - evlog@2.13.0
strictDepBuilds: true
blockExoticSubdeps: true

packages:
  - apps/*
  - packages/*

catalogs:
  dev:
    "@cloudflare/vitest-pool-workers": 0.16.3
    typescript: 6.0.3
    turbo: 2.9.12
    oxfmt: 0.45.0
    oxlint: 1.60.0
    oxlint-tsgolint: 0.21.1
    vitest: 4.1.6
    wrangler: 4.90.0
    "@cloudflare/workers-types": 4.20260511.1

  prod:
    "@hono/zod-openapi": 1.4.0
    "@octokit/core": 7.0.6
    "@octokit/plugin-paginate-rest": 14.0.0
    "@scalar/hono-api-reference": 0.10.14
    ai: 6.0.177
    evlog: 2.17.0
    hono: 4.12.21
    workers-ai-provider: 3.1.14
    zod: 4.4.3

  image:
    "@resvg/resvg-wasm": 2.4.1
    hono-jsx-to-react: 0.2.1
    satori: 0.21.0

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd
minimumReleaseAgeExclude:
  # Renovate security update: hono@4.12.21
  - hono@4.12.21
