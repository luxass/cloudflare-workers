name: deploy assets worker to production

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run the workflow without creating a deployment
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "apps/assets/**"
      - ".github/workflows/assets-push-deploy.yaml"
      - ".github/workflows/reusable-deploy.yaml"
      - "packages/**"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "pnpm-lock.yaml"

permissions: {}

jobs:
  deploy:
    uses: ./.github/workflows/reusable-deploy.yaml
    with:
      app: assets
      wrangler_environment: production
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs['dry-run'] == 'true' }}
      build_arg: build:assets
      typecheck_arg: --filter assets run typecheck
      test_arg: --filter assets run test
